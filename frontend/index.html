    <div class="container">

        </div>

        <div class="form-group">

            <select id="produto" onchange="preencherPreco()">

            </select>

                💰 Preço sugerido: <strong id="preco-sugerido"></strong>
            </div>

            <div class="form-group">

            <div class="form-group">
                <label>Preço Unitário (R$) *</label>
                <input type="number" id="preco_unitario" step="0.01" placeholder="Ex: 39.99" oninput="calcularTotal()">
            </div>
        </div>

        <div class="form-group">
            <label>Valor Total</label>
            <input type="text" id="valor_total" readonly style="background:#f8f9fa; color:#333; font-weight:bold;">
        </div>

        <div class="form-group">
            <label>Cliente *</label>
            <input type="text" id="cliente" placeholder="Digite o nome do cliente..." autocomplete="off"
                oninput="filtrarClientes()" onblur="fecharLista()">
            <div class="autocomplete-lista" id="autocomplete-lista" style="display:none"></div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Status do Pagamento *</label>
                <select id="status_pagamento">
                    <option value="">Selecione</option>
                    <option value="pago">Pago</option>
                    <option value="devendo">Devendo</option>
                </select>
            </div>
            <div class="form-group">
                <label>Condição *</label>
                <select id="condicao">
                    <option value="">Selecione</option>
                    <option value="normal">Normal</option>
                    <option value="promoção">Promoção</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Data da Venda *</label>
            <input type="date" id="data_venda">
        </div>

        <button id="btn-registrar" onclick="registrarVenda()">✅ Registrar Venda</button>
        <div class="mensagem sucesso" id="msg-sucesso">✅ Venda registrada com sucesso!</div>
        <div class="mensagem erro" id="msg-erro"></div>
    </div>

    <script>
        const API = 'http://127.0.0.1:5000';
        let produtos = [];
        let clientes = [];

        async function carregarProdutos() {
            try {
                const res = await fetch(`${API}/produtos`);
                const data = await res.json();
                produtos = data.produtos;
                const select = document.getElementById('produto');
                select.innerHTML = '<option value="">Selecione o produto</option>';
                produtos.forEach(p => {
                    select.innerHTML += `<option value="${p.id}" data-preco="${p.preco}" data-nome="${p.nome}">${p.nome}</option>`;
                });
            } catch (e) {
                document.getElementById('produto').innerHTML = '<option value="">Erro ao carregar produtos</option>';
            }
        }

        async function carregarClientes() {
            try {
                const res = await fetch(`${API}/api/clientes`);
                const data = await res.json();
                clientes = data.clientes;
            } catch (e) {
                clientes = [];
            }
        }

        function filtrarClientes() {
            const input = document.getElementById('cliente');
            const lista = document.getElementById('autocomplete-lista');
            const termo = input.value.toLowerCase().trim();

            if (termo.length < 1) {
                lista.style.display = 'none';
                return;
            }

            const filtrados = clientes.filter(c => c.nome.toLowerCase().includes(termo));

            lista.innerHTML = '';

            filtrados.forEach(c => {
                const item = document.createElement('div');
                item.className = 'autocomplete-item';
                const tipoCor = c.tipo === 'OURO' ? 'tipo-ouro' : c.tipo === 'PRATA' ? 'tipo-prata' : 'tipo-bronze';
                item.innerHTML = `
          <span>${c.nome}</span>
          <span class="tipo ${tipoCor}">${c.tipo || ''}</span>
        `;
                item.onmousedown = () => {
                    input.value = c.nome;
                    lista.style.display = 'none';
                };
                lista.appendChild(item);
            });

            // Opção para novo cliente
            const novo = document.createElement('div');
            novo.className = 'autocomplete-novo';
            novo.innerHTML = `➕ Cadastrar "${input.value}" como novo cliente`;
            novo.onmousedown = () => {
                window.open('/clientes', '_blank');
                lista.style.display = 'none';
            };
            lista.appendChild(novo);

            lista.style.display = 'block';
        }

        function fecharLista() {
            setTimeout(() => {
                document.getElementById('autocomplete-lista').style.display = 'none';
            }, 200);
        }

        function preencherPreco() {
            const select = document.getElementById('produto');
            const option = select.options[select.selectedIndex];
            const preco = option.getAttribute('data-preco');
            if (preco) {
                document.getElementById('preco_unitario').value = preco;
                document.getElementById('preco-sugerido').textContent = `R$ ${parseFloat(preco).toFixed(2)}`;
                document.getElementById('preco-info').style.display = 'block';
                calcularTotal();
            } else {
                document.getElementById('preco-info').style.display = 'none';
            }
        }

        function calcularTotal() {
            const qtd = parseFloat(document.getElementById('quantidade').value) || 0;
            const preco = parseFloat(document.getElementById('preco_unitario').value) || 0;
            const total = qtd * preco;
            document.getElementById('valor_total').value = total > 0 ? `R$ ${total.toFixed(2)}` : '';
        }

        async function registrarVenda() {
            const select = document.getElementById('produto');
            const option = select.options[select.selectedIndex];

            const dados = {
                id_produto: select.value,
                produto: option.getAttribute('data-nome'),
                quantidade: document.getElementById('quantidade').value,
                preco_unitario: document.getElementById('preco_unitario').value,
                cliente: document.getElementById('cliente').value,
                status_pagamento: document.getElementById('status_pagamento').value,
                condicao: document.getElementById('condicao').value,
                data_venda: document.getElementById('data_venda').value
            };

            if (!dados.id_produto || !dados.quantidade || !dados.preco_unitario || !dados.cliente || !dados.status_pagamento || !dados.condicao || !dados.data_venda) {
                document.getElementById('msg-erro').textContent = '❌ Preencha todos os campos obrigatórios!';
                document.getElementById('msg-erro').style.display = 'block';
                document.getElementById('msg-sucesso').style.display = 'none';
                return;
            }

            const btn = document.getElementById('btn-registrar');
            btn.disabled = true;
            btn.textContent = '⏳ Registrando...';

            try {
                const res = await fetch(`${API}/venda`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(dados) });
                const data = await res.json();
                if (data.sucesso) {
                    document.getElementById('msg-sucesso').style.display = 'block';
                    document.getElementById('msg-erro').style.display = 'none';
                    document.getElementById('quantidade').value = '';
                    document.getElementById('preco_unitario').value = '';
                    document.getElementById('valor_total').value = '';
                    document.getElementById('cliente').value = '';
                    document.getElementById('produto').value = '';
                    document.getElementById('status_pagamento').value = '';
                    document.getElementById('condicao').value = '';
                    document.getElementById('preco-info').style.display = 'none';
                } else {
                    document.getElementById('msg-erro').textContent = '❌ ' + data.erro;
                    document.getElementById('msg-erro').style.display = 'block';
                    document.getElementById('msg-sucesso').style.display = 'none';
                }
            } catch (e) {
                document.getElementById('msg-erro').textContent = '❌ Erro ao conectar com o servidor!';
                document.getElementById('msg-erro').style.display = 'block';
            }

            btn.disabled = false;
            btn.textContent = '✅ Registrar Venda';
        }

        document.getElementById('data_venda').valueAsDate = new Date();
        carregarProdutos();
        carregarClientes();
    </script>
</body>

</html> -->

<!DOCTYPE html>

    <style>

        }

        label {
            display: block;

        }

        input,
        select {
            width: 100%;

        @media (max-width: 500px) {

            }

</head>

<body>

    <button class="toggle-theme" onclick="alternarTema()">
        <span id="tema-icone">🌙</span>
        <span id="tema-texto">Escuro</span>
    </button>

    <div class="container">
        <div class="header-top">
            <h1>📋 Registro de Venda</h1>
        </div>
        <div class="nav"><a href="/menu">← Voltar para o Menu</a></div>
        <div class="divider"></div>

        <div class="form-group">
            <label>Produto *</label>
            <select id="produto" onchange="preencherPreco()">
                <option value="">Carregando produtos...</option>
            </select>
            <div class="preco-info" id="preco-info" style="display:none">
                💰 Preço sugerido: <strong id="preco-sugerido"></strong>
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Quantidade *</label>
                <input type="number" id="quantidade" min="1" placeholder="Ex: 2" oninput="calcularTotal()">
            </div>
            <div class="form-group">
                <label>Preço Unitário (R$) *</label>
                <input type="number" id="preco_unitario" step="0.01" placeholder="Ex: 39.99" oninput="calcularTotal()">
            </div>
        </div>

        <div class="form-group">
            <label>Valor Total</label>
            <input type="text" id="valor_total" readonly placeholder="Calculado automaticamente">
        </div>

        <div class="form-group">
            <label>Cliente *</label>
            <input type="text" id="cliente" placeholder="Digite o nome do cliente..." autocomplete="off"
                oninput="filtrarClientes()" onblur="fecharLista()">
            <div class="autocomplete-lista" id="autocomplete-lista" style="display:none"></div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Status do Pagamento *</label>
                <select id="status_pagamento">
                    <option value="">Selecione</option>
                    <option value="pago">Pago</option>
                    <option value="devendo">Devendo</option>
                </select>
            </div>
            <div class="form-group">
                <label>Condição *</label>
                <select id="condicao">
                    <option value="">Selecione</option>
                    <option value="normal">Normal</option>
                    <option value="promoção">Promoção</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Data da Venda *</label>
            <input type="date" id="data_venda">
        </div>

        <button class="btn-primary" id="btn-registrar" onclick="registrarVenda()">✅ Registrar Venda</button>
        <div class="mensagem sucesso" id="msg-sucesso">✅ Venda registrada com sucesso!</div>
        <div class="mensagem erro" id="msg-erro"></div>
    </div>

    <script>
        const API = 'http://127.0.0.1:5000';
        let produtos = [];
        let clientes = [];

        // Tema
        const temaSalvo = localStorage.getItem('tema') || 'light';
        document.documentElement.setAttribute('data-theme', temaSalvo);
        atualizarBotao(temaSalvo);

        function alternarTema() {
            const atual = document.documentElement.getAttribute('data-theme');
            const novo = atual === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', novo);
            localStorage.setItem('tema', novo);
            atualizarBotao(novo);
        }

        function atualizarBotao(tema) {
            document.getElementById('tema-icone').textContent = tema === 'light' ? '🌙' : '☀️';
            document.getElementById('tema-texto').textContent = tema === 'light' ? 'Escuro' : 'Claro';
        }

        async function carregarProdutos() {
            try {
                const res = await fetch(`${API}/produtos`);
                const data = await res.json();
                produtos = data.produtos;
                const select = document.getElementById('produto');
                select.innerHTML = '<option value="">Selecione o produto</option>';
                produtos.forEach(p => {
                    select.innerHTML += `<option value="${p.id}" data-preco="${p.preco}" data-nome="${p.nome}">${p.nome}</option>`;
                });
            } catch (e) {
                document.getElementById('produto').innerHTML = '<option value="">Erro ao carregar produtos</option>';
            }
        }

        async function carregarClientes() {
            try {
                const res = await fetch(`${API}/api/clientes`);
                const data = await res.json();
                clientes = data.clientes;
            } catch (e) { clientes = []; }
        }

        function filtrarClientes() {
            const input = document.getElementById('cliente');
            const lista = document.getElementById('autocomplete-lista');
            const termo = input.value.toLowerCase().trim();
            if (termo.length < 1) { lista.style.display = 'none'; return; }
            const filtrados = clientes.filter(c => c.nome.toLowerCase().includes(termo));
            lista.innerHTML = '';
            filtrados.forEach(c => {
                const item = document.createElement('div');
                item.className = 'autocomplete-item';
                const tipoCor = c.tipo === 'OURO' ? 'tipo-ouro' : c.tipo === 'PRATA' ? 'tipo-prata' : 'tipo-bronze';
                item.innerHTML = `<span>${c.nome}</span><span class="tipo ${tipoCor}">${c.tipo || ''}</span>`;
                item.onmousedown = () => { input.value = c.nome; lista.style.display = 'none'; };
                lista.appendChild(item);
            });
            const novo = document.createElement('div');
            novo.className = 'autocomplete-novo';
            novo.innerHTML = `➕ Cadastrar "${input.value}" como novo cliente`;
            novo.onmousedown = () => { window.open('/clientes', '_blank'); lista.style.display = 'none'; };
            lista.appendChild(novo);
            lista.style.display = 'block';
        }

        function fecharLista() {
            setTimeout(() => { document.getElementById('autocomplete-lista').style.display = 'none'; }, 200);
        }

        function preencherPreco() {
            const select = document.getElementById('produto');
            const option = select.options[select.selectedIndex];
            const preco = option.getAttribute('data-preco');
            if (preco) {
                document.getElementById('preco_unitario').value = preco;
                document.getElementById('preco-sugerido').textContent = `R$ ${parseFloat(preco).toFixed(2)}`;
                document.getElementById('preco-info').style.display = 'block';
                calcularTotal();
            } else {
                document.getElementById('preco-info').style.display = 'none';
            }
        }

        function calcularTotal() {
            const qtd = parseFloat(document.getElementById('quantidade').value) || 0;
            const preco = parseFloat(document.getElementById('preco_unitario').value) || 0;
            const total = qtd * preco;
            document.getElementById('valor_total').value = total > 0 ? `R$ ${total.toFixed(2)}` : '';
        }

        async function registrarVenda() {
            const select = document.getElementById('produto');
            const option = select.options[select.selectedIndex];
            const dados = {
                id_produto: select.value,
                produto: option.getAttribute('data-nome'),
                quantidade: document.getElementById('quantidade').value,
                preco_unitario: document.getElementById('preco_unitario').value,
                cliente: document.getElementById('cliente').value,
                status_pagamento: document.getElementById('status_pagamento').value,
                condicao: document.getElementById('condicao').value,
                data_venda: document.getElementById('data_venda').value
            };
            if (!dados.id_produto || !dados.quantidade || !dados.preco_unitario || !dados.cliente || !dados.status_pagamento || !dados.condicao || !dados.data_venda) {
                document.getElementById('msg-erro').textContent = '❌ Preencha todos os campos obrigatórios!';
                document.getElementById('msg-erro').style.display = 'block';
                document.getElementById('msg-sucesso').style.display = 'none';
                return;
            }
            const btn = document.getElementById('btn-registrar');
            btn.disabled = true;
            btn.textContent = '⏳ Registrando...';
            try {
                const res = await fetch(`${API}/venda`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(dados) });
                const data = await res.json();
                if (data.sucesso) {
                    document.getElementById('msg-sucesso').style.display = 'block';
                    document.getElementById('msg-erro').style.display = 'none';
                    document.getElementById('quantidade').value = '';
                    document.getElementById('preco_unitario').value = '';
                    document.getElementById('valor_total').value = '';
                    document.getElementById('cliente').value = '';
                    document.getElementById('produto').value = '';
                    document.getElementById('status_pagamento').value = '';
                    document.getElementById('condicao').value = '';
                    document.getElementById('preco-info').style.display = 'none';
                } else {
                    document.getElementById('msg-erro').textContent = '❌ ' + data.erro;
                    document.getElementById('msg-erro').style.display = 'block';
                    document.getElementById('msg-sucesso').style.display = 'none';
                }
            } catch (e) {
                document.getElementById('msg-erro').textContent = '❌ Erro ao conectar com o servidor!';
                document.getElementById('msg-erro').style.display = 'block';
            }
            btn.disabled = false;
            btn.textContent = '✅ Registrar Venda';
        }

        document.getElementById('data_venda').valueAsDate = new Date();
        carregarProdutos();
        carregarClientes();
    </script>
</body>

</html>
